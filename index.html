<style>
/* ══ Reset & tokens ══════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0B1120;--surf:#111827;--card:#1A2235;--bdr:#1E2D45;
  --accent:#00D4FF;--grn:#10B981;--amb:#F59E0B;--red:#EF4444;
  --txt:#F0F4FF;--muted:#64748B;--soft:#94A3B8;
  --nav:56px;
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);
  --sar:env(safe-area-inset-right,0px);
  --r:12px;--r-sm:8px;--r-lg:16px;
}
html{background:var(--bg);height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif;
  color:var(--txt);background:var(--bg);
  min-height:100%;
  padding-bottom:calc(var(--nav) + var(--sab) + 8px);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overscroll-behavior:none;
}

/* ══ Topbar ══════════════════════════════════════════════════════════════ */
.topbar{
  position:sticky;top:0;z-index:100;
  background:var(--surf);
  border-bottom:1px solid var(--bdr);
  padding:calc(var(--sat) + 10px) calc(16px + var(--sar)) 10px calc(16px + var(--sal));
  display:flex;align-items:center;justify-content:space-between;
  /* GPU layer for smooth scroll */
  will-change:transform;
  -webkit-backdrop-filter:blur(12px);
  backdrop-filter:blur(12px);
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,#00D4FF 0%,#0891B2 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:900;color:#000;
  box-shadow:0 2px 8px #00D4FF30;
}
.brand-name{font-size:18px;font-weight:700;color:var(--txt);letter-spacing:-.3px;line-height:1.1;}
.brand-sub{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}
.status{display:flex;align-items:center;gap:6px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--grn);box-shadow:0 0 6px var(--grn);animation:pulse-dot 2.5s ease-in-out infinite;}
@keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:.5;}}
.dot-lbl{font-size:11px;color:var(--muted);}

/* ══ Install banner ══════════════════════════════════════════════════════ */
.install-bar{
  display:none;
  background:linear-gradient(135deg,#00D4FF12,#0891B220);
  border-bottom:1px solid #00D4FF30;
  padding:10px 16px;
  align-items:center;justify-content:space-between;gap:10px;
}
.install-bar.show{display:flex;}
.install-txt{font-size:12px;color:var(--soft);flex:1;}
.install-txt strong{color:var(--accent);}
.install-btn{padding:7px 14px;background:var(--accent);color:#000;border:none;border-radius:var(--r-sm);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;}
.install-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 6px;line-height:1;}

/* ══ Page content ════════════════════════════════════════════════════════ */
.page{padding:14px calc(16px + var(--sar)) 14px calc(16px + var(--sal));}

/* ══ Bottom nav ══════════════════════════════════════════════════════════ */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nav) + var(--sab));
  background:var(--surf);
  border-top:1px solid var(--bdr);
  display:flex;align-items:flex-start;padding-top:6px;
  padding-left:var(--sal);padding-right:var(--sar);
  z-index:100;
  -webkit-backdrop-filter:blur(20px);
  backdrop-filter:blur(20px);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;cursor:pointer;
  color:var(--muted);font-family:inherit;
  padding:6px 4px;
  transition:color .2s;
  -webkit-user-select:none;user-select:none;
}
.nav-btn.active{color:var(--accent);}
.nav-btn:active{opacity:.7;}
.nav-icon{font-size:21px;line-height:1.1;transition:transform .2s;}
.nav-btn.active .nav-icon{transform:scale(1.1);}
.nav-label{font-size:10px;font-weight:600;letter-spacing:.02em;}

/* ══ Cards ═══════════════════════════════════════════════════════════════ */
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r-lg);padding:16px;margin-bottom:14px;}
.card-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:14px;}

/* ══ Fields ══════════════════════════════════════════════════════════════ */

/* ══ Spell banner ════════════════════════════════════════════════════════ */
.spell-banner{background:#00D4FF08;border:1px solid #00D4FF33;border-radius:var(--r-sm);padding:10px 12px;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start;}

.spell-chips{display:flex;flex-wrap:wrap;gap:5px;}

/* ══ Score ring block ════════════════════════════════════════════════════ */

/* ══ Check pills & rows ══════════════════════════════════════════════════ */

.fade{animation:fadeUp .2s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:none;}}
/* Reduce motion */
@media(prefers-reduced-motion:reduce){.fade{animation:none;}}

<script>
// ══ PWA: Service Worker via Blob ═══════════════════════════════════════════
(function() {
  if (!('serviceWorker' in navigator)) return;

  const SW_CODE = `
const CACHE = 'complai-v1';
const ASSETS = [self.location.href];

self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.addAll(ASSETS)).then(() => self.skipWaiting())
  );
});

self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    ).then(() => self.clients.claim())
  );
});

self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    caches.match(e.request).then(cached => {
      const fetched = fetch(e.request).then(res => {
        if (res && res.status === 200) {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
        }
        return res;
      }).catch(() => cached);
      return cached || fetched;
    })
  );
});
  `;

  const blob = new Blob([SW_CODE], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);

  navigator.serviceWorker.register(swUrl).then(reg => {
    console.log('[Complai] SW registered');
  }).catch(err => {
    console.log('[Complai] SW error:', err);
  });
})();

// ══ PWA: Offline detection ══════════════════════════════════════════════════
const offlineBar = document.getElementById('offline-bar');
function updateOnline() {
  offlineBar.classList.toggle('show', !navigator.onLine);
}
window.addEventListener('online', updateOnline);
window.addEventListener('offline', updateOnline);
updateOnline();

// ══ PWA: Install prompt ══════════════════════════════════════════════════════
let deferredPrompt = null;
const installBar = document.getElementById('install-bar');
const installBtn = document.getElementById('install-btn');
const installClose = document.getElementById('install-close');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  installBar.classList.add('show');
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBar.classList.remove('show');
});

installClose.addEventListener('click', () => {
  installBar.classList.remove('show');
});

window.addEventListener('appinstalled', () => {
  installBar.classList.remove('show');
});
</script>

function spellCorrect(text) {
  if(!text||!text.trim()) return {corrected:text,changes:[]};
  const changes=[]; let result=text;
  Object.entries(DICT).forEach(([w,r])=>{
    try{
      const rx=new RegExp(`\\b${w.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")}\\b`,"gi");
      if(rx.test(result)) result=result.replace(rx,m=>{
        const fix=m[0]===m[0].toUpperCase()&&m[0]!==m[0].toLowerCase()?r[0].toUpperCase()+r.slice(1):r;
        if(m.toLowerCase()!==fix.toLowerCase()) changes.push({from:m,to:fix});
        return fix;
      });
    }catch(ex){}
  });
  const seen=new Set();
  return {corrected:result,changes:changes.filter(c=>{const k=c.from.toLowerCase()+"→"+c.to.toLowerCase();if(seen.has(k))return false;seen.add(k);return true;})};
}

// Deterministic "hash" so same participant always gets same variant, but
// different participants get different sentence structures.
function variantIdx(seed) {
  let h = 0;
  for (let i = 0; i < seed.length; i++) { h = (Math.imul(31, h) + seed.charCodeAt(i)) | 0; }
  return Math.abs(h) % 4;
}

function genNote({participant,ndisNumber,worker,date,shiftType,duration,rawNotes}){
  const {corrected:clean,changes:sc}=spellCorrect(rawNotes);
  const name=participant||"the participant",first=name.split(" ")[0],d=fmt(date),lo=clean.toLowerCase();
  const pos=/happy|good|well|great|enjoy|smile|positive|calm|pleased|proud/.test(lo);
  const anx=/anxious|nervous|worried|upset|distress|agitat/.test(lo);
  const inc=/incident|fall|hurt|injur|aggress|crisis/.test(lo);
  const mood=pos&&!anx?"positive and engaged":anx?"initially anxious but settled as the session progressed":"generally cooperative throughout the session";
  const eng=pos?"actively engaged and responsive":"present and participated with support";
  const agoal=shiftType==="Community Access"?"community participation and social inclusion":shiftType==="Daily Living"?"daily living skills and household management":shiftType==="Personal Care"?"personal care and hygiene routines":"functional skills and daily activities";
  const sdesc=shiftType==="Personal Care"?"hands-on personal care assistance":shiftType==="Community Access"?"accompaniment and facilitation in the community":shiftType==="Daily Living"?"assistance with daily living tasks and household activities":"structured support";

  // Pick variant set deterministically from participant name
  const v=variantIdx(first+shiftType);
  const outcome=OUTCOME_VARIANTS[v](first,pos);
  const summary=SUMMARY_VARIANTS[v](first,duration,shiftType,d,mood,inc);
  const engagement=ENGAGEMENT_VARIANTS[v](first,eng,anx,pos,outcome);
  const goalPara=GOAL_VARIANTS[v](first,agoal,pos);
  const observation=OBSERVATION_VARIANTS[v](first,anx,inc);

  const note=`NDIS PROGRESS NOTE\n══════════════════════════════════════════════\nParticipant:     ${participant||"—"}${ndisNumber?`  (NDIS: ${ndisNumber})`:""}\nSupport Worker:  ${worker||"—"}\nDate:            ${d}\nSupport Type:    ${shiftType}\nDuration:        ${duration} hour(s)\n══════════════════════════════════════════════\n\nSUMMARY\n──────────────────────────────────────────────\n${summary}\n\nACTIVITIES & SUPPORT PROVIDED\n──────────────────────────────────────────────\nThe following support was provided during this session:\n\n${clean.trim().split(/[.!?]+/).filter(s=>s.trim().length>4).map(s=>`• ${tc(s.trim())}.`).join("\n")}\n\nThe support worker provided ${sdesc} in accordance with ${first}'s current NDIS support plan.\n\nPARTICIPANT ENGAGEMENT & RESPONSE\n──────────────────────────────────────────────\n${engagement}\n\nGOAL PROGRESS\n──────────────────────────────────────────────\n${goalPara}\n\nWORKER OBSERVATIONS\n──────────────────────────────────────────────\n${observation}\n──────────────────────────────────────────────\nRecorded by:   ${worker||"Support Worker"}\nDate recorded: ${now()}\nStatus:        COMPLETE — Pending supervisor review\n══════════════════════════════════════════════`;
  return {note,spellChanges:sc};
}

function genIncident({participant,worker,date,time,location,incidentType,severity,description,actionsTaken,witnesses,injuries,followUp}){
  const name=participant||"the participant",first=name.split(" ")[0],sev=severity||SEVERITY[0],isH=sev.startsWith("High"),isR=/high|injury|significant|safeguard|medical emergency/i.test(sev+incidentType);
  return `NDIS INCIDENT REPORT\n══════════════════════════════════════════════\n${isH?"⚠  HIGH SEVERITY — REVIEW REQUIRED IMMEDIATELY\n══════════════════════════════════════════════\n":""}\nINCIDENT DETAILS\n──────────────────────────────────────────────\nParticipant:      ${participant||"—"}\nSupport Worker:   ${worker||"—"}\nDate:             ${fmt(date)}\nTime:             ${time||"Not recorded"}\nLocation:         ${location||"Not specified"}\nIncident Type:    ${incidentType}\nSeverity:         ${sev}\n\nREGULATORY STATUS\n──────────────────────────────────────────────\n${isR?"⚠ REPORTABLE INCIDENT — Notify the NDIS Commission via myNDIS Provider portal within 24 hours (if immediate risk) or 5 business days.":"✓ NON-REPORTABLE — Record in your internal incident management system."}\n\nDESCRIPTION OF INCIDENT\n──────────────────────────────────────────────\n${description.trim().split(/[.!?]+/).filter(s=>s.trim().length>4).map(s=>`${tc(s.trim())}.`).join(" ")}\n\nIMMEDIATE ACTIONS TAKEN\n──────────────────────────────────────────────\n${actionsTaken?actionsTaken.trim().split(/[.!?]+/).filter(s=>s.trim().length>4).map(s=>`• ${tc(s.trim())}.`).join("\n"):"• Responded to situation immediately.\n• Participant monitored for wellbeing.\n• Incident documented in client management system."}\n\nINJURIES / HARM\n──────────────────────────────────────────────\n${injuries||"No physical injuries reported."}\n\nFOLLOW-UP ACTIONS\n──────────────────────────────────────────────\n${followUp?followUp.trim().split(/[.!?]+/).filter(s=>s.trim().length>4).map((s,i)=>`${i+1}. ${tc(s.trim())}.`).join("\n"):"1. Review with Team Leader within 24 hours.\n2. Support plan reviewed for risk mitigation.\n3. Follow-up welfare check at next session.\n4. Incident register updated."}\n\n──────────────────────────────────────────────\nCompleted by:    ${worker||"Support Worker"}\nDate:            ${now()}\nSupervisor:      ${isH?"YES — Required immediately":"Pending"}\nStatus:          ${isH?"URGENT — Escalate to management":"COMPLETE — Pending supervisor review"}\n══════════════════════════════════════════════`;
}

function genPlan({name,age,disability,goals,strengths,challenges,supports}){
  const flds={goals,strengths,challenges,supports};let allC=[];const clean={};
  Object.entries(flds).forEach(([k,v])=>{if(v){const {corrected,changes}=spellCorrect(v);clean[k]=corrected;allC=allC.concat(changes);}else clean[k]=v;});
  const seen=new Set();
  const spellChanges=allC.filter(c=>{const k=c.from.toLowerCase()+"→"+c.to.toLowerCase();if(seen.has(k))return false;seen.add(k);return true;});
  const first=(name||"the participant").split(" ")[0];
  const note=`NDIS PARTICIPANT SUPPORT PLAN\n══════════════════════════════════════════════\nParticipant:  ${name||"—"}${age?" | Age: "+age:""}\nDiagnosis:    ${disability||"—"}\nPlan Date:    ${now()}\nReview Date:  ${new Date(Date.now()+365*24*60*60*1000).toLocaleDateString("en-AU")}\n══════════════════════════════════════════════\n\n1. PARTICIPANT OVERVIEW\n──────────────────────────────────────────────\n${tc(first)} is a${age?" "+age+"-year-old":""} person living with ${disability}. This support plan was developed in partnership with ${first} to reflect their individual needs, goals, and aspirations. The plan is person-centred and strengths-based, aligned with ${first}'s NDIS funding and the NDIS Practice Standards.\n\n2. STRENGTHS & ABILITIES\n──────────────────────────────────────────────\n${(clean.strengths||"Motivated to achieve personal goals, engages positively with support workers, demonstrates resilience and adaptability").split(",").map(s=>`• ${tc(s.trim())}.`).join("\n")}\n\n3. SUPPORT NEEDS & CHALLENGES\n──────────────────────────────────────────────\n${(clean.challenges||"Daily living tasks, community access, communication and social participation").split(",").map(s=>`• ${tc(s.trim())}.`).join("\n")}\n\n4. NDIS GOALS (SMART)\n──────────────────────────────────────────────\nGoal 1 — Daily Living Independence\n${first} will increase independence in daily living tasks with decreasing support over 12 months.\n\nGoal 2 — Community Participation\n${first} will participate in at least two community activities per fortnight.\n\nGoal 3 — ${clean.goals?tc(clean.goals.split(/[.,]/)[0].trim()):"Skill Development"}\n${first} will ${clean.goals?clean.goals.split(/[.,]/)[0].trim().toLowerCase():"develop functional skills to support greater independence"}.\n\n5. SUPPORT STRATEGIES\n──────────────────────────────────────────────\n• Provide verbal prompting and physical guidance as needed\n• Use visual schedules and step-by-step instructions\n• Encourage and celebrate achievements to build confidence\n• Facilitate community access using positive behaviour support strategies\n• Collaborate with allied health to implement therapy recommendations\n\n6. CURRENT SUPPORTS\n──────────────────────────────────────────────\n${clean.supports||"Support worker assistance, family/carer support, allied health services."}\n\n7. REVIEW SCHEDULE\n──────────────────────────────────────────────\n• Monthly:    Progress note review with Team Leader\n• Quarterly:  Goal progress review with participant and coordinator\n• Annually:   Full plan review with participant, family and NDIS planner\n\n──────────────────────────────────────────────\nPrepared by: Support Coordinator\nDate:        ${now()}\nStatus:      DRAFT — Pending participant and guardian sign-off\n══════════════════════════════════════════════`;
  return {note,spellChanges};
}

function checkCompliance(noteText,fd){
  const t=noteText.toLowerCase(),f=fd||{};
  const CC={"Identification":"c-id","Content Quality":"c-cq","Safety & Compliance":"c-sc","Language":"c-lg"};
  const checks=[
    {label:"Person-First Language",   cat:"Language",           pass:!/(the disabled|suffers from|is suffering|afflicted|wheelchair.bound|confined to|mentally retarded|handicapped)/.test(t)&&(t.includes("participant")||t.includes("person")||t.includes("individual")),note:"Respectful person-first language used.",tip:"Replace 'suffers from' with 'lives with'. Avoid 'the disabled'."},
    {label:"NDIS Number Recorded",    cat:"Identification",     pass:!!(f.ndisNumber&&f.ndisNumber.replace(/\s/g,"").length>=9),note:"9-digit NDIS number recorded.",tip:"Enter the 9-digit NDIS number — required for payment claim verification."},
    {label:"Duration Recorded",       cat:"Identification",     pass:!!(f.duration&&parseFloat(f.duration)>0)&&/\d+(\.\d+)?\s*(hour|hr|min)/.test(t),note:"Session duration appears in the note.",tip:"Duration must appear in the note body — e.g. '2-hour session'."},
    {label:"Support Type Referenced", cat:"Identification",     pass:!!(f.shiftType&&t.includes(f.shiftType.toLowerCase().split(" ")[0])),note:"Support type matches NDIS line item.",tip:"State the support type in the note — e.g. 'community access'."},
    {label:"Specific Activities",     cat:"Content Quality",    pass:t.length>300&&(t.split("•").length>2||t.split("\n").filter(l=>l.trim().length>10).length>4),note:"Specific activities described.",tip:"Describe exactly what happened. Vague notes fail audit."},
    {label:"Named Goal Referenced",   cat:"Content Quality",    pass:/goal \d|goal one|goal two|goal three|ndis goal|plan goal|independence goal|community goal|daily living goal/.test(t)||/(contributed to|aligned with|progress toward|working toward|supports.*goal)/.test(t),note:"Links session to a specific named NDIS goal.",tip:"Name the goal — e.g. 'contributed to Goal 1: independence in daily living'."},
    {label:"Participant Response",    cat:"Content Quality",    pass:/(participant|he |she |they )\s*(was|presented|appeared|demonstrated|responded|engaged|expressed|showed)/.test(t)||/presented as|demonstrated|expressed (satisfaction|enjoyment|frustration|anxiety)|was (engaged|cooperative|motivated|anxious|calm|settled)/.test(t),note:"Documents how participant presented.",tip:"Include mood — e.g. 'John presented as calm and motivated'."},
    {label:"Incident Status",         cat:"Safety & Compliance",pass:/no (significant |major |reportable )?(incident|safeguarding|concern|injury|harm)|no concerns (were|identified)/.test(t)||/incident|safeguard|injury|harm|risk/.test(t),note:"Incident status explicitly stated.",tip:"Add: 'No incidents or safeguarding concerns were identified during this session.'"},
    {label:"Strengths-Based",         cat:"Language",           pass:/(demonstrated|showed|achieved|was able to|successfully|independently|with (minimal|reduced|decreasing) support|built confidence|made progress|accomplished)/.test(t),note:"Highlights participant capabilities.",tip:"Use capability language — 'John successfully completed' not 'John needed assistance'."},
    {label:"Professional Language",   cat:"Language",           pass:!/(he's|she's|they're|gonna|wanna|kinda|sorta|a bit|heaps|really good|super|awesome|totally|basically|tbh|lol|ok |fine\.|stuff)/.test(t),note:"Formal professional tone maintained.",tip:"Remove informal language — progress notes are legal documents."},
    {label:"No Vague Phrases",        cat:"Language",           pass:!/(seemed fine|was ok|did (some )?stuff|had a good (time|day|session)|went (well|ok|okay|alright)|nothing (to report|special|unusual)|as (usual|normal|per normal)|same as (always|last time|usual))/.test(t),note:"No vague or non-specific phrases.",tip:"'Had a good session' means nothing to auditors. Be specific."},
    {label:"Worker Identified",       cat:"Identification",     pass:!!(f.worker&&f.worker.trim().length>1)&&(t.includes("recorded by")||t.includes("support worker")||t.includes(f.worker.toLowerCase())),note:"Support worker identified in the note.",tip:"Ensure the worker's name appears in the sign-off section."},
  ];
  checks.forEach(c=>c.catCls=CC[c.cat]||"c-lg");
  const passed=checks.filter(c=>c.pass).length,score=Math.round((passed/checks.length)*100);
  return {score,status:score>=80?"Compliant":score>=58?"Needs Review":"Non-Compliant",checks};
}

function exportPDF(content,title){
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Arial,sans-serif;font-size:11pt;color:#1a1a2e}.page{max-width:750px;margin:0 auto;padding:40px 48px}.header{border-bottom:3px solid #0891B2;padding-bottom:18px;margin-bottom:28px;display:flex;justify-content:space-between;align-items:flex-end}.logo{font-size:22pt;font-weight:800;color:#0891B2}.logo span{color:#00D4FF}.meta{font-size:9pt;color:#64748B;text-align:right;letter-spacing:0.08em;text-transform:uppercase;line-height:1.6}.body{font-size:10pt;line-height:1.85;white-space:pre-wrap;font-family:'Courier New',monospace;color:#1e293b}.footer{border-top:1px solid #e2e8f0;margin-top:32px;padding-top:14px;display:flex;justify-content:space-between;font-size:8pt;color:#94A3B8}@media print{body{-webkit-print-color-adjust:exact}}</style></head><body><div class="page"><div class="header"><div class="logo">Com<span>plai</span></div><div class="meta">NDIS AI Documentation<br>Generated: ${now()}<br>Review before submission</div></div><div class="body">${content.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div><div class="footer"><span>Complai · complai.com.au</span><span style="color:#10B981;font-weight:600">✓ ${now()}</span></div></div></body></html>`;
  const w=window.open(URL.createObjectURL(new Blob([html],{type:"text/html"})),"_blank");
  if(w) w.onload=()=>setTimeout(()=>w.print(),400);
}

const MAX_HISTORY = 10;

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]"); }
  catch { return []; }
}

function saveToHistory(entry) {
  try {
    const existing = loadHistory();
    const updated  = [entry, ...existing].slice(0, MAX_HISTORY);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(updated));
  } catch(e) {}
}

function deleteFromHistory(id) {
  try {
    const updated = loadHistory().filter(e => e.id !== id);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(updated));
  } catch(e) {}
}

function SpellBanner({changes}){
  if(!changes||!changes.length) return null;
  return h("div",{className:"spell-banner"},
    h("div",{style:{fontSize:16,flexShrink:0}},"✏️"),
    h("div",{style:{flex:1}},
      h("div",{className:"spell-title"},`${changes.length} spelling correction${changes.length>1?"s":""} applied`),
      h("div",{className:"spell-chips"},
        changes.map((c,i)=>h("span",{key:i,className:"spell-chip"},
          h("span",{className:"s-old"},c.from),h("span",{className:"s-arr"},"→"),h("span",null,c.to)
        ))
      )
    )
  );
}

function ScoreRing({score}){
  const col=score>=80?"#10B981":score>=58?"#F59E0B":"#EF4444";
  return h("svg",{width:56,height:56,viewBox:"0 0 56 56"},
    h("circle",{cx:28,cy:28,r:22,fill:"none",stroke:"#1E2D45",strokeWidth:5}),
    h("circle",{cx:28,cy:28,r:22,fill:"none",stroke:col,strokeWidth:5,strokeDasharray:`${score/100*138} 138`,strokeLinecap:"round",transform:"rotate(-90 28 28)"}),
    h("text",{x:28,y:33,textAnchor:"middle",fontSize:14,fontWeight:700,fill:col,fontFamily:"inherit"},score),
  );
}

function CompliancePanel({compliance}){
  const [show,setShow]=useState(false);
  const sc=compliance.score;
  const col=sc>=80?"#10B981":sc>=58?"#F59E0B":"#EF4444";
  return h("div",null,
    h("div",{className:"score-block"},
      h(ScoreRing,{score:sc}),
      h("div",null,
        h("div",{className:"score-title"},compliance.status),
        h("div",{className:"score-sub"},`${compliance.checks.filter(c=>c.pass).length} of 12 criteria passed`),
      ),
    ),
    h("div",{className:"check-pills"},
      compliance.checks.map((c,i)=>h("span",{key:i,className:`cpill ${c.pass?"cp-pass":"cp-fail"}`},`${c.pass?"✓":"✗"} ${c.label}`))
    ),
    h("button",{className:"expand-btn",onClick:()=>setShow(p=>!p)},show?"Hide detail ▲":"View detail ▼"),
    show&&h("div",{className:"check-rows fade"},
      compliance.checks.map((c,i)=>h("div",{key:i,className:"check-row"},
        h("div",{className:"c-icon",style:{color:c.pass?"#10B981":"#EF4444"}},c.pass?"✓":"✗"),
        h("div",{style:{flex:1}},
          h("div",{style:{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:3}},
            h("div",{className:"c-lbl"},c.label),
            h("span",{className:`cat-b ${c.catCls}`},c.cat),
          ),
          h("div",{className:"c-note"},c.note),
          !c.pass&&c.tip&&h("div",{className:"c-tip"},`💡 ${c.tip}`),
        ),
        h("div",{style:{fontSize:10,fontWeight:700,color:c.pass?"#10B981":"#EF4444",flexShrink:0,marginTop:2}},c.pass?"Pass":"Fail"),
      )),
      h("div",{className:"check-footer",style:{background:sc>=80?"#10B98112":"#F59E0B12",border:`1px solid ${col}33`,color:col}},
        sc>=80?"✓ Note meets NDIS Practice Standards. Safe to submit.":
          `⚠ ${compliance.checks.filter(c=>!c.pass).length} criteria failed — review tips before submitting.`
      ),
    ),
  );
}

                ),
              ),
              h("button",{className:"hist-del",onClick:ev=>{ev.stopPropagation();del(e.id);}},"\u00d7"),
            )),
          ),
    ),
    h("div",{className:"alert a-accent",style:{marginTop:4}},
      h("span",null,"💾"),
      h("span",null,"Documents are stored on this device only. They stay here until you clear them or uninstall the app."),
    ),
  );
}

// ── App ───────────────────────────────────────────────────────────────────
const TABS=[{id:"notes",label:"Notes",icon:"📋"},{id:"incident",label:"Incidents",icon:"⚠️"},{id:"plan",label:"Care Plan",icon:"📄"},{id:"history",label:"History",icon:"🗂️"}];

function App(){
  const [tab,setTab]=useState("notes");
  const switchTab=useCallback(t=>{setTab(t);window.scrollTo({top:0,behavior:"instant"});},[]);
  return h(React.Fragment,null,
    h("div",{className:"topbar"},
      h("div",{className:"brand"},
        h("div",{className:"brand-icon"},"C"),
        h("div",null,h("div",{className:"brand-name"},"Complai"),h("div",{className:"brand-sub"},"NDIS Docs")),
      ),
      h("div",{className:"status"},h("div",{className:"dot"}),h("span",{className:"dot-lbl"},"Ready")),
    ),
    tab==="notes"    && h(NoteScreen),
    tab==="incident" && h(IncidentScreen),
    tab==="plan"     && h(CarePlanScreen),
    tab==="history"  && h(HistoryScreen),
    h("div",{className:"bottom-nav"},
      TABS.map(t=>h("button",{key:t.id,className:`nav-btn${tab===t.id?" active":""}`,onClick:()=>switchTab(t.id)},
        h("div",{className:"nav-icon"},t.icon),
        h("div",{className:"nav-label"},t.label),
      ))
    ),
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
